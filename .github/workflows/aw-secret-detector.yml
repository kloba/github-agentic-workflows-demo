name: Secret Scanning Alert Detector

# Daily: poll /repos/.../secret-scanning/alerts. Files a HIGH-PRIORITY
# issue per leaked secret. NEVER auto-fixed — rotation requires external
# actions (revoke at source, rotate, update dependents, strip from git
# history). Issue Fixer is excluded via `do-not-fix`.
#
# Note: GitHub's native secret-scanning UI alerts maintainers immediately
# via email/notification when a new secret is detected. This workflow's
# job is to mirror those alerts as tracked GitHub Issues for the same
# triage queue everything else lives in — once per day is enough.

on:
  schedule:
    - cron: "30 8 * * *"  # daily at 08:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
# The secret scanning API requires a PAT with `security_events` scope —
# GITHUB_TOKEN has no permission key that grants this. Workflow uses
# GH_AW_GITHUB_TOKEN at runtime; declaring no Actions permission here.

concurrency:
  group: secret-detector
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch open secret scanning alerts and file issues
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if ! ALERTS=$(gh api "repos/$REPO/secret-scanning/alerts?state=open&per_page=50" 2>/dev/null); then
            echo "::warning::Could not fetch secret scanning alerts (token may lack scope, or feature not enabled). Skipping run."
            exit 0
          fi

          if ! echo "$ALERTS" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "::warning::Secret scanning API returned non-array. Skipping."
            echo "$ALERTS" | head -c 500
            exit 0
          fi

          COUNT=$(echo "$ALERTS" | jq 'length')
          echo "Found $COUNT open secret scanning alerts"

          echo "$ALERTS" | jq -c '.[]' | while read -r alert; do
            ALERT_NUM=$(echo "$alert" | jq -r '.number')
            SECRET_TYPE=$(echo "$alert" | jq -r '.secret_type')
            SECRET_TYPE_DISPLAY=$(echo "$alert" | jq -r '.secret_type_display_name // .secret_type')
            ALERT_URL=$(echo "$alert" | jq -r '.html_url')
            STATE=$(echo "$alert" | jq -r '.state')
            VALIDITY=$(echo "$alert" | jq -r '.validity // "unknown"')
            CREATED_AT=$(echo "$alert" | jq -r '.created_at')

            MARKER="<!-- secret-alert:${ALERT_NUM} -->"

            EXISTING=$(gh issue list --repo "$REPO" --state all --label "secret-leak" --json number,body -q ".[] | select(.body | contains(\"$MARKER\")) | .number" | head -1)

            if [ -n "$EXISTING" ]; then
              echo "Skipping alert $ALERT_NUM — already tracked in #$EXISTING"
              continue
            fi

            TITLE="[secret] LEAKED ${SECRET_TYPE_DISPLAY} — IMMEDIATE ROTATION REQUIRED"

            BODY=$(cat <<EOF
          # 🚨 Leaked secret detected

          A credential of type **${SECRET_TYPE_DISPLAY}** has been detected in this repository.

          - **Alert**: #${ALERT_NUM}
          - **Validity**: ${VALIDITY}
          - **State**: ${STATE}
          - **Created**: ${CREATED_AT}

          [View alert (includes file location) →](${ALERT_URL})

          ## What to do — in this order

          1. **Revoke the credential at the source.** Do this first — don't wait. Rotating after removing from git is too late; assume it's been harvested.
          2. **Issue a new credential** and update wherever it's used (SSM Parameter Store, .env, etc.).
          3. **Remove the secret from git history** using \`git filter-repo\` or BFG. Force-push only after coordinating with the team.
          4. **Close this alert** in GitHub once steps 1-3 are done.

          ## Why this is NOT auto-fixed

          Secret rotation requires actions outside the repository (revoking at the issuing service, updating dependents). An automated code change cannot remove the leak's blast radius — the secret may already be cached, indexed, or harvested. \`do-not-fix\` is applied automatically.

          ${MARKER}
          EOF
          )

            echo "Filing new issue for alert $ALERT_NUM (${SECRET_TYPE_DISPLAY})"
            gh issue create \
              --repo "$REPO" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "security,secret-leak,do-not-fix" || echo "::warning::Failed to file issue for alert $ALERT_NUM"
          done
